<!-- 데이터셋 엔진 랜딩페이지 (다크 네이비 + 네온 라임 · 와이어프레임 지구본 히어로) -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>데이터셋 엔진 — 업무 문서를 학습 데이터로</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#15233F;
    --navy-2:#1B2D4E;
    --navy-line:#2A3F63;
    --lime:#C7F24E;
    --lime-600:#B4E22F;
    --cyan:#34E0C8;
    --text:#EAF1FA;
    --dim:#9FB2CC;
    --dim-2:#8DA1BE;
    --r:14px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;min-height:100vh;
    background:
      radial-gradient(900px 600px at 8% 40%, rgba(52,224,200,.10), transparent 55%),
      radial-gradient(700px 500px at 95% 0%, rgba(199,242,78,.07), transparent 55%),
      var(--navy);
    color:var(--text);
    font-family:"Gothic A1",system-ui,-apple-system,sans-serif;
    font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;
  }
  a{color:inherit;text-decoration:none}
  .mono{font-family:"JetBrains Mono",monospace}
  .wrap{width:100%;max-width:1180px;margin:0 auto;padding:0 28px}

  /* nav */
  .nav-outer{position:sticky;top:0;z-index:50;padding:16px 0;background:rgba(21,35,63,.72);backdrop-filter:blur(10px);border-bottom:1px solid transparent;transition:border-color .2s}
  .nav-outer.scrolled{border-bottom-color:var(--navy-line)}
  .nav{display:flex;align-items:center;gap:14px}
  .logo{display:flex;align-items:center;gap:11px;font-weight:800;font-size:18px;letter-spacing:-.01em}
  .logo .mk{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--cyan),#1FB8A6);display:grid;place-items:center;box-shadow:0 8px 20px -8px rgba(52,224,200,.8)}
  .nav-links{display:flex;gap:4px;margin-left:auto}
  .nav-links a{padding:9px 15px;border-radius:10px;color:var(--dim);font-weight:600;font-size:14.5px;transition:background .18s,color .18s}
  .nav-links a:hover{background:rgba(255,255,255,.06);color:var(--text)}
  .nav-cta{margin-left:14px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14.5px;border-radius:11px;padding:11px 18px;border:1px solid transparent;cursor:pointer;transition:transform .06s,background .18s,box-shadow .18s,border-color .18s,color .18s}
  .btn:active{transform:translateY(1px)}
  .btn-lime{background:var(--lime);color:#16243F;box-shadow:0 12px 26px -12px rgba(199,242,78,.7)}
  .btn-lime:hover{background:var(--lime-600)}
  .btn-ghost{color:var(--text);border-color:var(--navy-line)}
  .btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
  a.btn:focus-visible,.nav-links a:focus-visible{outline:2px solid var(--lime);outline-offset:3px}

  /* hero */
  .hero{flex:1;display:grid;grid-template-columns:.95fr 1.05fr;align-items:center;gap:40px;padding:40px 0 72px;position:relative}
  .globe-col{position:relative;min-height:440px}
  .globe{position:absolute;left:-90px;top:50%;transform:translateY(-50%);width:560px;height:560px;max-width:none}
  .globe .ring{transform-origin:center}
  @keyframes spin{to{transform:rotate(360deg)}}
  .globe .rot{animation:spin 60s linear infinite;transform-origin:280px 280px}

  .copy{max-width:560px}
  .eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:"JetBrains Mono",monospace;font-size:12.5px;font-weight:500;color:var(--cyan);background:rgba(52,224,200,.08);border:1px solid rgba(52,224,200,.25);padding:6px 13px;border-radius:999px}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 4px rgba(52,224,200,.18)}
  h1{font-weight:900;font-size:52px;line-height:1.08;letter-spacing:-.02em;margin:24px 0 0;color:var(--lime);white-space:nowrap}
  h1 .w{color:var(--text)}
  .lede{color:var(--dim);font-size:16.5px;margin:22px 0 0;max-width:38em}
  .hero-cta{display:flex;align-items:center;gap:18px;margin-top:34px;flex-wrap:wrap}
  .text-cta{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--lime);border-bottom:2px solid var(--lime);padding-bottom:3px;transition:color .18s,border-color .18s}
  .text-cta:hover{color:var(--lime-600);border-color:var(--lime-600)}
  .text-cta:focus-visible{outline:2px solid var(--lime);outline-offset:4px}

  .meta{display:flex;gap:26px;margin-top:46px;flex-wrap:wrap}
  .meta .m b{display:block;font-weight:900;font-size:26px;color:var(--text);letter-spacing:-.01em}
  .meta .m b .u{color:var(--lime);font-size:18px;margin-left:2px}
  .meta .m span{color:var(--dim-2);font-size:13px;font-weight:500}

  footer{padding:22px 0;border-top:1px solid var(--navy-line)}
  .foot{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;color:var(--dim-2);font-size:13px}

  @media (max-width:920px){
    .hero{grid-template-columns:1fr;gap:8px;padding-top:24px;text-align:left}
    .globe-col{min-height:280px;order:2;margin-top:24px}
    .globe{position:relative;left:50%;top:auto;transform:translateX(-50%);width:360px;height:360px}
    .copy{order:1}
    h1{font-size:46px}
  }
  @media (max-width:560px){
    .nav-links a{padding:9px 11px}
    h1{font-size:29px}
    .globe{width:280px;height:280px}
    .meta{gap:18px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}.globe .rot{animation:none}}
</style>
</head>
<body>

  <!-- NAV -->
  <div class="nav-outer" id="navbar">
    <nav class="nav wrap" aria-label="주 메뉴">
      <a class="logo" href="/static/landing.html">
        <span class="mk" aria-hidden="true"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#0B1A14" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7c0-1.5 3.6-3 8-3s8 1.5 8 3-3.6 3-8 3-8-1.5-8-3Z"/><path d="M4 7v10c0 1.5 3.6 3 8 3s8-1.5 8-3V7"/><path d="M4 12c0 1.5 3.6 3 8 3s8-1.5 8-3"/></svg></span>
        데이터셋 엔진
      </a>
      <div class="nav-links">
        <a href="/static/dashboard.html">대시보드</a>
        <a href="/">데이터셋 생성</a>
      </div>
      <div class="nav-cta">
        <a class="btn btn-lime" href="/static/dashboard.html">대시보드 보기
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </div>
    </nav>
  </div>

  <!-- HERO -->
  <header class="wrap hero">
    <!-- 와이어프레임 지구본 -->
    <div class="globe-col" aria-hidden="true">
      <svg class="globe" viewBox="0 0 560 560" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gWire" x1="40" y1="60" x2="500" y2="500" gradientUnits="userSpaceOnUse">
            <stop stop-color="#34E0C8"/>
            <stop offset="1" stop-color="#C7F24E"/>
          </linearGradient>
          <radialGradient id="gGlow" cx="0.42" cy="0.4" r="0.62">
            <stop stop-color="#34E0C8" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#34E0C8" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="280" cy="280" r="250" fill="url(#gGlow)"/>
        <g class="rot" stroke="url(#gWire)" stroke-width="1.1" opacity="0.92">
          <circle cx="280" cy="280" r="218" stroke-width="1.4"/>
          <!-- 경선 (세로 타원) -->
          <ellipse cx="280" cy="280" rx="55" ry="218"/>
          <ellipse cx="280" cy="280" rx="125" ry="218"/>
          <ellipse cx="280" cy="280" rx="185" ry="218"/>
          <line x1="280" y1="62" x2="280" y2="498"/>
          <!-- 위선 (가로 타원) -->
          <ellipse cx="280" cy="280" rx="218" ry="48"/>
          <ellipse cx="280" cy="280" rx="218" ry="118"/>
          <ellipse cx="280" cy="280" rx="218" ry="178"/>
          <line x1="62" y1="280" x2="498" y2="280"/>
        </g>
        <!-- 노드 점 -->
        <g fill="#C7F24E">
          <circle cx="158" cy="190" r="3.5"/>
          <circle cx="372" cy="150" r="3"/>
          <circle cx="420" cy="330" r="3.5"/>
          <circle cx="210" cy="400" r="3"/>
        </g>
      </svg>
    </div>

    <!-- 카피 -->
    <div class="copy">
      <span class="eyebrow"><span class="dot"></span>DOMAIN DATASET ENGINE · 로컬 추론</span>
      <h1>업무 문서를 <span class="w">학습 데이터</span>로.</h1>
      <p class="lede">PDF·HWP·엑셀에 잠든 업무 지식을 도메인 전문가 AI가 구조화하고, Unsloth 학습용 데이터셋까지 자동으로 만들어 검증합니다.</p>
      <div class="hero-cta">
        <a class="btn btn-lime" href="/static/dashboard.html">대시보드 보기
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
        <a class="text-cta" href="/">데이터셋 생성하기</a>
      </div>
      <div class="meta">
        <div class="m"><b>8<span class="u">종</span></b><span>지원 입력 포맷</span></div>
        <div class="m"><b>4<span class="u">종</span></b><span>Unsloth 학습 포맷</span></div>
        <div class="m"><b>PASS</b><span>자동 품질 검증</span></div>
      </div>
    </div>
  </header>

  <footer>
    <div class="wrap foot">
      <span>© 2026 데이터셋 엔진 · 업무 문서를 학습 데이터로</span>
      <span class="mono">로컬 Ollama 기반 · 단계 간 스키마 고정</span>
    </div>
  </footer>

<script>
  // 스크롤 시 내비 하단 경계선 표시
  const nav = document.getElementById("navbar");
  const onScroll = () => nav.classList.toggle("scrolled", window.scrollY > 8);
  onScroll();
  window.addEventListener("scroll", onScroll, { passive: true });
</script>
</body>
</html>
