<!-- 데이터셋 생성 시스템의 단일 페이지 웹 UI (Fira 타이포 + 블루/앰버 디자인 시스템) -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>도메인 특화 데이터셋 생성 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #34E0C8;
    --secondary: #34E0C8;
    --cta: #C7F24E;
    --cta-600: #B4E22F;
    --bg: #15233F;
    --surface: #1B2D4E;
    --surface-2: #16263F;
    --text: #EAF1FA;
    --muted: #9FB2CC;
    --border: #2A3F63;
    --accent-soft: rgba(52,224,200,.12);
    --accent-line: rgba(52,224,200,.30);
    --ok: #34D399; --ok-bg: rgba(52,211,153,.15);
    --bad: #FB7185; --bad-bg: rgba(251,113,133,.15);
    --radius: 16px;
    --shadow: 0 1px 2px rgba(0,0,0,.25), 0 14px 36px rgba(0,0,0,.40);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1000px 500px at 50% -10%, rgba(52,224,200,.12) 0%, rgba(52,224,200,0) 60%),
      radial-gradient(700px 400px at 90% 0%, rgba(199,242,78,.06) 0%, rgba(199,242,78,0) 55%),
      var(--bg);
    color: var(--text);
    font-family: "Fira Sans", system-ui, -apple-system, sans-serif;
    line-height: 1.6; font-size: 16px;
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap { width: 100%; max-width: 760px; padding: 56px 20px 72px; }

  .topnav { display: flex; gap: 8px; margin-bottom: 22px; }
  .topnav a {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13.5px; font-weight: 600; color: var(--muted);
    border: 1px solid var(--border); background: var(--surface);
    padding: 8px 14px; border-radius: 10px; cursor: pointer;
    transition: border-color .18s, color .18s, background .18s;
  }
  .topnav a:hover { border-color: var(--secondary); color: var(--text); background: rgba(52,224,200,.07); }

  header { text-align: center; margin-bottom: 28px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: "Fira Code", monospace; font-size: 12px; font-weight: 500;
    color: var(--primary); background: var(--accent-soft); border: 1px solid var(--accent-line);
    padding: 6px 13px; border-radius: 999px; margin-bottom: 18px;
  }
  h1 { font-size: 32px; font-weight: 700; margin: 0 0 12px; letter-spacing: -.02em; line-height: 1.25; }
  .sub { color: var(--muted); margin: 0 auto; max-width: 520px; font-size: 16px; }

  .card {
    display: block; width: 100%;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 26px; box-shadow: var(--shadow);
    margin-top: 20px;
  }
  .card-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; margin: 0 0 16px; }
  .step-no {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--primary); color: #0B1A2A; font-size: 12px; font-family: "Fira Code", monospace;
  }

  /* 드롭존 — label을 명시적 block flex로 (인라인 렌더 버그 방지) */
  .drop {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; min-height: 180px; gap: 6px; text-align: center;
    border: 2px dashed #38507A; border-radius: 12px; padding: 28px 20px;
    background: var(--surface-2); cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .drop:hover, .drop.drag { border-color: var(--secondary); background: rgba(52,224,200,.07); }
  .drop .ico { color: var(--secondary); }
  .drop .lead { font-size: 15px; color: var(--text); }
  .drop .fname { font-family: "Fira Code", monospace; font-size: 13px; color: var(--primary); background: var(--accent-soft); padding: 3px 10px; border-radius: 6px; }
  .formats { font-size: 12.5px; color: var(--muted); letter-spacing: .01em; }
  input[type=file] { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); border: 0; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; margin-top: 18px; padding: 14px 20px;
    background: var(--cta); color: #16243F; font-weight: 600; font-size: 15px;
    border: 0; border-radius: 11px; cursor: pointer; font-family: inherit;
    transition: background-color .2s, box-shadow .2s, transform .05s;
  }
  .btn:hover:not(:disabled) { background: var(--cta-600); color: #16243F; }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { background: #2A3F63; color: #6F84A3; cursor: not-allowed; }
  .btn:focus-visible, .drop:focus-visible, a:focus-visible {
    outline: 3px solid var(--secondary); outline-offset: 2px;
  }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(31,41,55,.3); border-top-color: #1F2937; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 결과 */
  #result { display: none; }
  .result-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 13px; border-radius: 999px; font-weight: 600; font-size: 14px; font-family: "Fira Code", monospace; }
  .pill.pass { color: var(--ok); background: var(--ok-bg); }
  .pill.fail { color: var(--bad); background: var(--bad-bg); }
  .meta-line { color: var(--muted); font-size: 14px; }
  .meta-line strong { color: var(--text); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 18px 0; }
  .metric { border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; background: var(--surface-2); }
  .metric .k { font-size: 12px; color: var(--muted); }
  .metric .v { font-size: 22px; font-weight: 600; font-family: "Fira Code", monospace; margin-top: 2px; display: flex; align-items: center; }
  .files-label { font-size: 13px; color: var(--muted); margin: 4px 0 8px; }
  .files { display: flex; flex-wrap: wrap; gap: 10px; }
  .files a {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--primary); text-decoration: none;
    border: 1px solid var(--accent-line); background: var(--accent-soft); padding: 8px 12px; border-radius: 8px;
    transition: background-color .2s;
  }
  .files a:hover { background: rgba(52,224,200,.20); }
  .issues { color: var(--bad); font-size: 14px; margin-top: 14px; }

  footer { color: #8DA1BE; font-size: 12.5px; margin-top: 28px; text-align: center; }

  @media (max-width: 560px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 25px; }
    .wrap { padding-top: 40px; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
  <main class="wrap">
    <nav class="topnav" aria-label="페이지 이동">
      <a href="/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
        메인으로
      </a>
      <a href="/static/dashboard.html">대시보드</a>
    </nav>
    <header>
      <span class="badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
        Domain Dataset Engine
      </span>
      <h1>도메인 특화 데이터셋 생성</h1>
      <p class="sub">업무 문서를 업로드하면 Unsloth 학습용 데이터셋(CSV·JSON·ChatML 등)을 자동 생성하고 품질을 검증합니다.</p>
    </header>

    <section class="card">
      <p class="card-title"><span class="step-no">1</span> 문서 업로드</p>
      <label class="drop" id="drop" for="file" tabindex="0" role="button" aria-label="문서 파일 선택 또는 드래그 앤 드롭">
        <span class="ico">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5-5 5 5"/><path d="M12 5v12"/></svg>
        </span>
        <span class="lead">파일을 드래그하거나 <strong>클릭하여 선택</strong></span>
        <span class="fname" id="fname" hidden></span>
        <span class="formats">PDF · DOCX · XLSX · PPTX · HWP · TXT · MD · 이미지(OCR)</span>
      </label>
      <input type="file" id="file" aria-label="문서 파일">
      <button class="btn" id="run" type="button">
        <span id="btn-label">생성 및 검증</span>
      </button>
    </section>

    <section class="card" id="result" aria-live="polite"></section>

    <footer>로컬 Ollama 기반 · 단계 간 스키마 고정 · 검증 통과 시 PASS</footer>
  </main>

<script>
const $ = (id) => document.getElementById(id);
const drop = $("drop"), fileInput = $("file");

drop.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } });
["dragover","dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); }));
["dragleave"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); }));
drop.addEventListener("drop", e => { e.preventDefault(); drop.classList.remove("drag"); if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; showName(); } });
fileInput.addEventListener("change", showName);

function showName() {
  const f = fileInput.files[0], el = $("fname");
  if (f) { el.textContent = "선택됨: " + f.name; el.hidden = false; } else { el.hidden = true; }
}

$("run").onclick = async () => {
  const f = fileInput.files[0];
  if (!f) { drop.classList.add("drag"); setTimeout(() => drop.classList.remove("drag"), 600); return; }
  const btn = $("run");
  btn.disabled = true;
  $("btn-label").textContent = "처리 중...";
  btn.insertAdjacentHTML("afterbegin", '<span class="spinner" id="sp" aria-hidden="true"></span>');
  try {
    const fd = new FormData(); fd.append("file", f);
    const res = await fetch("/api/generate", { method: "POST", body: fd });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ("서버 오류 " + res.status));
    renderResult(data);
  } catch (e) {
    renderError(e.message);
  } finally {
    btn.disabled = false;
    $("sp")?.remove();
    $("btn-label").textContent = "생성 및 검증";
  }
};

function icon(d) {
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + d + '</svg>';
}
const dlIcon = icon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>');

// 도메인 접두 산출물명을 안전하게 인코딩해 다운로드 링크를 만든다(한글 파일명 대응).
function dl(artifacts, key, label) {
  const name = artifacts && artifacts[key];
  if (!name) return "";
  return `<a href="/api/download/${encodeURIComponent(name)}">${dlIcon} ${label}</a>`;
}

function renderResult(d) {
  const box = $("result"); box.style.display = "block";
  const cls = d.status === "PASS" ? "pass" : "fail";
  const dot = d.status === "PASS" ? icon('<path d="M20 6 9 17l-5-5"/>') : icon('<path d="M18 6 6 18M6 6l12 12"/>');
  const fmtIco = d.format_consistent ? icon('<path d="M20 6 9 17l-5-5"/>') : icon('<path d="M18 6 6 18M6 6l12 12"/>');
  box.innerHTML = `
    <p class="card-title"><span class="step-no">2</span> 생성 결과</p>
    <div class="result-head">
      <span class="pill ${cls}">${dot} ${d.status}</span>
      <span class="meta-line">도메인 <strong>${d.domain}</strong> · ${d.expert} · LLM <strong>${d.llm_mode}</strong></span>
    </div>
    <div class="grid">
      <div class="metric"><div class="k">품질 점수</div><div class="v">${d.quality_score}</div></div>
      <div class="metric"><div class="k">레코드 수</div><div class="v">${d.row_count}</div></div>
      <div class="metric"><div class="k">중복 제거</div><div class="v">${d.duplicates_removed}</div></div>
      <div class="metric"><div class="k">포맷 일관성</div><div class="v" style="color:${d.format_consistent?'var(--ok)':'var(--bad)'}">${fmtIco}</div></div>
    </div>
    <p class="files-label">다운로드</p>
    <div class="files">
      ${dl(d.artifacts, "csv", "CSV")}
      ${dl(d.artifacts, "json", "JSON")}
      ${dl(d.artifacts, "unsloth_chatml", "ChatML")}
      ${dl(d.artifacts, "unsloth_alpaca", "Alpaca")}
      ${dl(d.artifacts, "unsloth_sharegpt", "ShareGPT")}
      ${dl(d.artifacts, "report", "리포트")}
    </div>
    ${d.issues && d.issues.length ? '<p class="issues">이슈: ' + d.issues.join(", ") + '</p>' : ''}`;
  box.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function renderError(msg) {
  const box = $("result"); box.style.display = "block";
  box.innerHTML = `<p class="card-title"><span class="step-no" style="background:var(--bad)">!</span> 오류</p><p class="issues">${msg}</p>`;
}
</script>
</body>
</html>
